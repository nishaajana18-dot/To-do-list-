<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local AI</title>
  <script>
    if (window.location.protocol === 'file:') {
      window.location.replace('http://localhost:3001/llm-submit');
    }
  </script>
  <link rel="stylesheet" href="./style.css?v=13">
</head>
<body class="llm-shell">
  <main id="llm-submit-app" class="llm-page">
    <header class="llm-header">
      <a class="llm-brand" href="/llm-submit" aria-label="Local AI home">
        <span>Local AI</span>
      </a>
      <a class="new-prompt-link" href="/llm-queue">Queue</a>
    </header>

    <section class="submit-hero">
      <div class="hero-copy">
        <h1>Ask the model</h1>
      </div>

      <form id="llm-submit-form" class="prompt-composer">
        <div class="composer-label">
          <label for="prompt-input">Your prompt</label>
        </div>
        <textarea id="prompt-input" rows="8" placeholder="What would you like the model to work on?" required></textarea>
        <div class="composer-footer">
          <button type="submit" id="submit-prompt-btn">
            <span>Submit prompt</span>
          </button>
        </div>
      </form>
    </section>

    <section id="submit-status" class="submit-notice" aria-live="polite">Ready for a prompt.</section>

    <section id="submit-result" class="active-request" aria-labelledby="active-request-heading" hidden>
      <div class="active-request-copy">
        <h2 id="active-request-heading">Prompt accepted</h2>
        <p id="active-prompt" class="active-prompt"></p>
        <p id="submit-result-details" class="request-meta"></p>
        <div class="active-response" aria-live="polite">
          <p class="panel-label">Response</p>
          <pre id="active-response-text">Waiting for the model...</pre>
        </div>
      </div>
      <div class="active-request-actions">
        <a id="result-link" class="primary-link" href="#">View response</a>
      </div>
    </section>

    <section class="recent-section" aria-labelledby="recent-heading">
      <div class="section-heading">
        <div>
          <h2 id="recent-heading">Recent prompts</h2>
        </div>
        <button id="refresh-jobs-btn" class="refresh-button" type="button">Refresh</button>
      </div>
      <div id="recent-jobs" class="recent-jobs" aria-live="polite">
        <p class="empty-state">Loading recent prompts...</p>
      </div>
    </section>

  </main>

  <script src="./llm-submit.js?v=12"></script>
</body>
</html>
