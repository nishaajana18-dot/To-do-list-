<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Queue</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <main id="llm-app" class="panel">
    <h1>Prompt Queue</h1>
    <p class="panel-intro">Submit a prompt, get a tracking page instantly, and continue asking more.</p>

    <form id="llm-form" class="llm-form">
      <label for="prompt-input">Prompt</label>
      <textarea id="prompt-input" rows="5" placeholder="Ask your prompt..."></textarea>
      <button type="submit">Queue Prompt</button>
    </form>

    <section id="submit-result" class="submit-result" aria-live="polite"></section>

    <nav class="page-nav">
      <a href="/">Back to To-Do List</a>
    </nav>
  </main>

  <script src="llm.js"></script>
</body>
</html>
