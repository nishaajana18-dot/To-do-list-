<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local AI Response</title>
  <link rel="stylesheet" href="/style.css?v=17">
</head>
<body class="llm-shell">
  <main id="llm-job-app" class="llm-page response-page">
    <header class="llm-header">
      <a class="llm-brand" href="/llm-submit" aria-label="Local AI home">
        <span>Local AI</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="/llm-submit">Prompt</a>
        <a href="/llm-queue">Queue</a>
      </nav>
    </header>

    <section class="response-hero">
      <div>
        <h1>Response</h1>
        <p id="job-id-label" class="job-id-label" hidden></p>
      </div>
      <button id="refresh-job-btn" class="refresh-button" type="button">Refresh status</button>
    </section>

    <section id="job-status" class="response-status processing" aria-live="polite">
      <span class="status-orb" aria-hidden="true"></span>
      <span id="job-status-text">Loading job status...</span>
    </section>

    <div class="response-grid">
      <section class="response-panel prompt-panel">
        <p class="panel-label">Prompt</p>
        <pre id="job-prompt">Loading prompt details...</pre>
      </section>

      <section class="response-panel answer-panel">
        <p class="panel-label">Answer</p>
        <pre id="job-response">Waiting for the model...</pre>
      </section>
    </div>

    <section id="follow-up-section" class="follow-up-section" hidden>
      <h2>Follow-up question</h2>
      <form id="follow-up-form" class="follow-up-form">
        <label for="follow-up-input">Continue this chat</label>
        <textarea id="follow-up-input" rows="4" placeholder="Ask a follow-up question..."></textarea>
        <button id="follow-up-btn" type="submit">Ask follow-up</button>
      </form>
      <p id="follow-up-status" class="follow-up-status" aria-live="polite"></p>
      <a id="follow-up-link" class="quiet-link" href="#" hidden>View follow-up</a>
    </section>

    <details class="request-details">
      <summary>Request details</summary>
      <pre id="job-queue">Request number: pending
Status: loading</pre>
    </details>

  </main>

  <script src="/llm-job.js?v=11"></script>
</body>
</html>
